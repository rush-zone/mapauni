services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mapauni
      POSTGRES_PASSWORD: mapauni123
      POSTGRES_DB: mapauni
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
